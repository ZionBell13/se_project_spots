<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="photo journaling site for photography enthusiasts"
    />
    <meta name="keywords" content="Photography, Photojournal, Figma" />
    <meta name="author" content="Zion Bell" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spots Project</title>
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  </head>

  <body>
    <div class="page">
      <header class="header">
        <img src="./images/logo.svg" alt="Spots Logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="./images/avatar.jpg"
            alt="Bessie Cleman image"
            class="profile__image"
          />
          <div class="profile__column">
            <h1 class="profile__name">
              Aliaune Damala Bouga Time Bongo Puru Nacka Lu Lu Lu Badara Akon
              and young jeezy, trynna take it easy.
            </h1>
            <p class="profile__description">
              Known mononymously as Akon (/ˈeɪkɒn/), is a Senegalese-American
              singer, record producer, and entrepreneur. An influential figure
              in modern world
            </p>
            <button type="button" class="profile__button-edit">
              <img src="./images/marker.svg" alt="marker logo" />Edit Profile
            </button>
          </div>
          <button type="button" class="profile__new-button">
            <img src="./images/group-26.svg" alt="add post label" />
            New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">  
               <li class="card">
                <button class="card__delete-btn" type="button">
                  <img src="./images/deletebtn.svg" alt="Delete Button">
                </button> 
              <img
                src="#"
                alt=""
                class="card__image"
              />
              <div class="card__text">
                <h2 class="card__label"></h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            </template>  
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__label">2023 © Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button type="button" class="modal__close">
            <img src="./images/close.svg" alt="close button" />
          </button>
          <h2 class="modal__title">Edit profile</h2>
          <form class="modal__form" id="edit-profile-form" novalidate>
            <label for="profile-name-input" class="modal__label"
              >Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                required
                minlength="2"
                maxlength="40"
              /> 
              <span class="modal__error"></span>
            </label>
            <label for="profile-description-input" class="modal__label"
              >Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                required
                minlength="2"
                maxlength="200"
              />
              <span class="modal__error"></span>
            </label>
            <button type="submit" class="modal__save-button">
              <img src="./images/savebtn.svg" alt="save button" />
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button type="button" class="modal__close">
            <img src="./images/close.svg" alt="close button" />
          </button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form" id="card-form" novalidate>
            <label for="card-image-input" class="modal__label"
              >Image link
              <input
                id="card-image-input"
                type="url"
                class="modal__input"
                placeholder="Paste a link to the picture"
                required
                type="url"
              />
              <span id="card-image-input-error" class="modal__error"></span>
            </label>
            <label for="card-caption-input" class="modal__label"
              >Caption
              <input
                id="card-caption-input"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
                required
                minlength="2"
                maxlength="30"
              />
              <span id="card-caption-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__save-button">
              <img src="./images/savebtn.svg" alt="save button" />
            </button>
          </form>
        </div>
      </div>

      <div class="modal modal_type_preview" id="preview-modal">
        <div class="modal__image-container">
          <button type="button" class="modal__close modal__close_type_preview">
            <img src="./images/close.svg" alt="close button" />
          </button>
          <img 
                class="modal__image"
                src="" 
                alt="">
          <p class="modal__caption"></p>
          
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
    <script src="./scripts/validation.js"></script>
  </body>
</html>
